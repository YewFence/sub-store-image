# 开发/本地测试使用，直接暴露端口，不安全，请勿在生产环境使用
services:
  sub-store:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FRONTEND_API_BASE: ${SUB_STORE_FRONTEND_BACKEND_PATH:-/backend}
        FRONTEND_PUBLIC_PATH: ${FRONTEND_PUBLIC_PATH:-/}
    container_name: sub-store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/backend/api/utils/env').then(async (resp) => { if (!resp.ok) process.exit(1); const data = await resp.json(); if (data?.status !== 'success') process.exit(1); process.exit(0); }).catch(() => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${SUB_STORE_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
