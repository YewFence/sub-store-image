services:
  sub-store:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FRONTEND_API_BASE: ${SUB_STORE_FRONTEND_BACKEND_PATH:-/backend}
        FRONTEND_PUBLIC_PATH: ${FRONTEND_PUBLIC_PATH:-/}
    container_name: sub-store
    restart: unless-stopped
    ports:
      - "${SUB_STORE_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
